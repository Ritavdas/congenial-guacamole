<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pockaa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid #e5e5e5;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header svg { width: 20px; height: 20px; }
    .content { padding: 16px; }
    .settings {
      margin-bottom: 12px;
    }
    .settings label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .settings input:focus { border-color: #6366f1; }
    .url-preview {
      background: #f0f0f0;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #555;
      word-break: break-all;
      max-height: 60px;
      overflow: hidden;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #6366f1;
      color: white;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled {
      background: #c4b5fd;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .status.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }
    .status.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #e5e5e5;
      text-align: center;
    }
    .footer a {
      font-size: 12px;
      color: #6366f1;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
    </svg>
    <h1>Pockaa</h1>
  </div>

  <div class="content">
    <div id="setup" style="display:none;">
      <div class="settings">
        <label for="apiUrl">Your Pockaa URL</label>
        <input id="apiUrl" type="url" placeholder="https://your-app.vercel.app" />
      </div>
      <div class="settings">
        <label for="apiKey">API Key</label>
        <input id="apiKey" type="password" placeholder="Your extension API key" />
      </div>
      <div class="settings">
        <label for="userId">Your Clerk User ID</label>
        <input id="userId" type="text" placeholder="user_2abc123..." />
      </div>
      <button class="btn btn-primary" id="saveSettings">Save Settings</button>
    </div>

    <div id="main" style="display:none;">
      <div class="url-preview" id="currentUrl"></div>
      <button class="btn btn-primary" id="saveBtn">Save to Pockaa</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="toggleSettings">Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
